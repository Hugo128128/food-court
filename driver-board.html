<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mula Kitchens 外送看板</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, onSnapshot, query, orderBy } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMZ_9LER29KpuL7d0NsSjbxKWeR_c_aCQ",
    authDomain: "food-court-orders.firebaseapp.com",
    projectId: "food-court-orders",
    storageBucket: "food-court-orders.firebasestorage.app",
    messagingSenderId: "348196844429",
    appId: "1:348196844429:web:95a01423c510d499f7c3c4"
  };

  const app = initializeApp(firebaseConfig);
  const db  = getFirestore(app);
  let allOrders = [];

  const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    allOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderBoard();
  });

  function renderBoard() {
    const pending  = allOrders.filter(o => o.status === 'pending');
    const active   = allOrders.filter(o => o.status === 'accepted' || o.status === 'delivering');
    const done     = allOrders.filter(o => o.status === 'done');

    document.getElementById('cnt-pending').textContent = pending.length;
    document.getElementById('cnt-active').textContent  = active.length;
    document.getElementById('cnt-done').textContent    = done.length;

    renderList('pending-list', pending, 'pending');
    renderList('active-list',  active,  'active');
  }

  function renderList(elId, orders, type) {
    const el = document.getElementById(elId);
    if (!orders.length) {
      el.innerHTML = `<div class="empty-state">${type === 'pending' ? '目前沒有待接的訂單' : '目前沒有進行中的訂單'}</div>`;
      return;
    }
    el.innerHTML = orders.map(o => {
      const isDelivering = o.status === 'delivering';
      const statusLabel  = isDelivering ? '配送中' : (o.status === 'accepted' ? '已接單' : '待接單');
      const statusCls    = isDelivering ? 'pill-delivering' : (o.status === 'accepted' ? 'pill-accepted' : 'pill-pending');
      const time = o.createdAt?.toDate ? o.createdAt.toDate().toLocaleTimeString('zh-TW',{hour:'2-digit',minute:'2-digit'}) : '—';

      return `<div class="order-card ${type === 'pending' ? 'pending-card' : 'active-card'}">
        <div class="card-top">
          <div class="card-info">
            <div class="card-shop">${o.shop}${o.pickupNumber ? ' <span class="card-pickup">'+o.pickupNumber+'</span>' : ''}${o.customer ? ' · '+o.customer : ''}</div>
            <div class="card-addr">${o.address}</div>
            <div class="card-items">${o.items}</div>
            <div class="card-tags">
              ${o.distance    ? `<span class="ctag ctag-blue">📍 ${o.distance} 公里</span>` : ''}
              ${o.amount      ? `<span class="ctag ctag-green">💰 $${o.amount}</span>` : ''}
              ${o.deliveryFee ? `<span class="ctag ctag-gray">外送費 $${o.deliveryFee}</span>` : ''}
              ${o.cashPayment==='是' ? `<span class="ctag ctag-cash">需收現金</span>` : ''}
              ${o.note        ? `<span class="ctag ctag-gray">備註：${o.note}</span>` : ''}
            </div>
          </div>
          <div class="card-right">
            <div class="time-block">
              <div class="time-row"><span class="time-label">建立</span>${time}</div>
              ${o.deliveryTime ? `<div class="time-deadline">${o.deliveryTime}</div>` : ''}
            </div>
            <span class="status-pill ${statusCls}">${statusLabel}</span>
            ${o.driver ? `<div class="driver-chip">${o.driver}</div>` : ''}
          </div>
        </div>
      </div>`;
    }).join('');
  }
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  *,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
  :root {
    --bg:#0f1117;--surface:#1a1d27;--surface-2:#222533;
    --border:rgba(255,255,255,0.08);--border-hover:rgba(255,255,255,0.15);
    --text:#f0f0ee;--text-2:#9a9a96;--text-3:#5a5a58;
    --green:#06C755;--green-dim:rgba(6,199,85,0.12);
    --amber:#f59e0b;--amber-dim:rgba(245,158,11,0.12);
    --blue:#60a5fa;--blue-dim:rgba(96,165,250,0.12);
    --radius:12px;--radius-sm:8px;
  }
  body{font-family:'Noto Sans TC',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;font-size:15px;line-height:1.5}

  /* Topbar */
  .topbar{background:var(--surface);border-bottom:1px solid var(--border);padding:14px 24px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:10}
  .topbar h1{font-size:17px;font-weight:700;display:flex;align-items:center;gap:8px}
  .live-dot{width:8px;height:8px;border-radius:50%;background:var(--green);animation:pulse 2s infinite;flex-shrink:0}
  @keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
  .line-hint{font-size:13px;color:var(--text-2);background:var(--green-dim);border:1px solid rgba(6,199,85,0.2);border-radius:20px;padding:5px 14px}

  /* Stats */
  .stats-bar{display:flex;gap:12px;padding:16px 24px;border-bottom:1px solid var(--border)}
  .stat-chip{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:10px 18px;display:flex;align-items:center;gap:10px}
  .stat-num{font-size:22px;font-weight:700}
  .num-amber{color:var(--amber)} .num-green{color:var(--green)} .num-blue{color:var(--blue)}

  /* Columns */
  .columns{display:grid;grid-template-columns:1fr 1fr;min-height:calc(100vh - 130px)}
  .col{padding:20px 24px;border-right:1px solid var(--border)}
  .col:last-child{border-right:none}
  .col-header{display:flex;align-items:center;gap:8px;margin-bottom:16px}
  .col-title{font-size:14px;font-weight:700;color:var(--text-2);letter-spacing:.5px}
  .col-count{font-size:11px;font-weight:700;padding:2px 8px;border-radius:10px}
  .count-amber{background:var(--amber-dim);color:var(--amber)}
  .count-blue{background:var(--blue-dim);color:var(--blue)}

  /* Cards */
  .order-card{border-radius:var(--radius);padding:16px;margin-bottom:10px;border:1px solid var(--border)}
  .pending-card{background:var(--surface);border-left:3px solid var(--amber)}
  .active-card{background:var(--surface);border-left:3px solid var(--green)}
  .card-top{display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
  .card-shop{font-size:17px;font-weight:700;margin-bottom:4px}
  .card-pickup{font-weight:400;color:var(--text-2);font-size:15px}
  .card-addr{font-size:13px;color:var(--text-2);margin-bottom:4px}
  .card-items{font-size:14px;color:var(--text);margin-bottom:8px}
  .card-tags{display:flex;flex-wrap:wrap;gap:6px}
  .ctag{font-size:12px;padding:3px 10px;border-radius:20px;font-weight:500}
  .ctag-blue{background:#1a2a3a;color:#60a5fa}
  .ctag-green{background:#0a2010;color:#4ade80}
  .ctag-gray{background:#1a1d27;color:#9a9a96;border:.5px solid #333}
  .ctag-cash{background:#2a1f0a;color:#f59e0b;font-weight:700}

  /* Right side of card */
  .card-right{display:flex;flex-direction:column;align-items:flex-end;gap:6px;flex-shrink:0;min-width:90px}
  .time-block{text-align:right}
  .time-row{display:flex;align-items:center;gap:5px;font-size:12px;color:var(--text-3);justify-content:flex-end;white-space:nowrap}
  .time-label{font-size:10px;background:#2a2d3a;padding:1px 5px;border-radius:4px;color:var(--text-3)}
  .time-deadline{color:var(--amber);font-weight:700;font-size:14px;text-align:right;line-height:1.4;margin-top:4px}
  .status-pill{font-size:12px;font-weight:500;padding:4px 10px;border-radius:20px;white-space:nowrap}
  .pill-pending{background:var(--amber-dim);color:var(--amber)}
  .pill-accepted{background:var(--green-dim);color:var(--green)}
  .pill-delivering{background:var(--blue-dim);color:var(--blue)}
  .driver-chip{font-size:12px;color:var(--text-2);background:var(--surface-2);padding:3px 10px;border-radius:20px;border:.5px solid var(--border)}

  .empty-state{text-align:center;padding:32px 20px;color:var(--text-3);font-size:14px}

  /* LINE 接單提示 */
  .line-banner{background:var(--green-dim);border-bottom:1px solid rgba(6,199,85,0.2);padding:10px 24px;text-align:center;font-size:14px;color:#4ade80;font-weight:500}

  @media(max-width:640px){
    .columns{grid-template-columns:1fr}
    .col{border-right:none;border-bottom:1px solid var(--border)}
    .stats-bar{flex-wrap:wrap;gap:8px;padding:12px 16px}
  }
</style>
</head>
<body>

<div class="topbar">
  <h1><div class="live-dot"></div>Mula Kitchens 外送看板</h1>
  <span class="line-hint">接單請在 LINE 群組操作</span>
</div>

<div class="line-banner">📱 看到想接的訂單？請到 LINE 群組點「✋ 接單」按鈕</div>

<div class="stats-bar">
  <div class="stat-chip"><div class="stat-num num-amber" id="cnt-pending">—</div><div style="font-size:12px;color:var(--text-2)">待接單</div></div>
  <div class="stat-chip"><div class="stat-num num-green" id="cnt-active">—</div><div style="font-size:12px;color:var(--text-2)">進行中</div></div>
  <div class="stat-chip"><div class="stat-num num-blue" id="cnt-done">—</div><div style="font-size:12px;color:var(--text-2)">今日完成</div></div>
</div>

<div class="columns">
  <div class="col">
    <div class="col-header">
      <span class="col-title">待接單</span>
      <span class="col-count count-amber" id="cnt-pending-badge">0</span>
    </div>
    <div id="pending-list"></div>
  </div>
  <div class="col">
    <div class="col-header">
      <span class="col-title">進行中</span>
      <span class="col-count count-blue" id="cnt-active-badge">0</span>
    </div>
    <div id="active-list"></div>
  </div>
</div>

<script>
  const obs = new MutationObserver(() => {
    document.getElementById('cnt-pending-badge').textContent = document.querySelectorAll('#pending-list .order-card').length;
    document.getElementById('cnt-active-badge').textContent  = document.querySelectorAll('#active-list .order-card').length;
  });
  obs.observe(document.getElementById('pending-list'), { childList: true });
  obs.observe(document.getElementById('active-list'),  { childList: true });
</script>

</body>
</html>
