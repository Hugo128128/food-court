<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>美食街訂單管理</title>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, updateDoc, query, orderBy, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDMZ_9LER29KpuL7d0NsSjbxKWeR_c_aCQ",
    authDomain: "food-court-orders.firebaseapp.com",
    projectId: "food-court-orders",
    storageBucket: "food-court-orders.firebasestorage.app",
    messagingSenderId: "348196844429",
    appId: "1:348196844429:web:95a01423c510d499f7c3c4"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const STATUS = {
    pending:    { label: '待接單', cls: 'badge-pending' },
    accepted:   { label: '已接單', cls: 'badge-accepted' },
    delivering: { label: '配送中', cls: 'badge-delivering' },
    done:       { label: '已送達', cls: 'badge-done' },
    cancelled:  { label: '已取消', cls: 'badge-cancelled' },
  };

  const STATUS_NEXT = {
    pending:    'accepted',
    accepted:   'delivering',
    delivering: 'done',
  };

  const STATUS_NEXT_LABEL = {
    pending:    '標記接單',
    accepted:   '標記出發',
    delivering: '標記送達',
  };

  let allOrders = [];
  let currentFilter = 'all';

  const q = query(collection(db, 'orders'), orderBy('createdAt', 'desc'));
  onSnapshot(q, (snapshot) => {
    allOrders = snapshot.docs.map(d => ({ id: d.id, ...d.data() }));
    renderAll();
  });

  window.submitOrder = async () => {
    const shop    = document.getElementById('f-shop').value.trim();
    const items   = document.getElementById('f-items').value.trim();
    const address = document.getElementById('f-address').value.trim();
    const note    = document.getElementById('f-note').value.trim();

    if (!shop || !items || !address) {
      alert('請填寫店家、品項、送達地址');
      return;
    }

    const btn = document.getElementById('submit-btn');
    btn.disabled = true;
    btn.textContent = '建立中...';

    try {
      await addDoc(collection(db, 'orders'), {
        shop, items, address, note,
        status: 'pending',
        driver: '',
        createdAt: serverTimestamp(),
      });
      document.getElementById('f-shop').value = '';
      document.getElementById('f-items').value = '';
      document.getElementById('f-address').value = '';
      document.getElementById('f-note').value = '';
      closeModal();
    } catch (e) {
      alert('建立失敗：' + e.message);
    }

    btn.disabled = false;
    btn.textContent = '建立訂單';
  };

  window.advanceStatus = async (id, nextStatus) => {
    let driver = '';
    if (nextStatus === 'accepted') {
      driver = prompt('接單外送員姓名（可留空）') ?? '';
    }
    const updateData = { status: nextStatus };
    if (driver) updateData.driver = driver;
    if (nextStatus === 'done') updateData.completedAt = serverTimestamp();
    await updateDoc(doc(db, 'orders', id), updateData);
  };

  window.cancelOrder = async (id) => {
    if (!confirm('確定要取消這筆訂單？')) return;
    await updateDoc(doc(db, 'orders', id), { status: 'cancelled' });
  };

  window.setFilter = (f) => {
    currentFilter = f;
    document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`[data-filter="${f}"]`).classList.add('active');
    renderList();
  };

  function renderAll() {
    renderStats();
    renderList();
  }

  function renderStats() {
    const counts = { pending: 0, active: 0, done: 0 };
    allOrders.forEach(o => {
      if (o.status === 'pending') counts.pending++;
      else if (o.status === 'accepted' || o.status === 'delivering') counts.active++;
      else if (o.status === 'done') counts.done++;
    });
    document.getElementById('stat-total').textContent  = allOrders.filter(o => o.status !== 'cancelled').length;
    document.getElementById('stat-pending').textContent = counts.pending;
    document.getElementById('stat-active').textContent  = counts.active;
    document.getElementById('stat-done').textContent    = counts.done;
  }

  function renderList() {
    const list = document.getElementById('order-list');
    const filtered = currentFilter === 'all'
      ? allOrders.filter(o => o.status !== 'cancelled')
      : allOrders.filter(o => {
          if (currentFilter === 'active') return o.status === 'accepted' || o.status === 'delivering';
          return o.status === currentFilter;
        });

    if (!filtered.length) {
      list.innerHTML = '<div class="empty">目前沒有訂單，點右上角「＋ 新增訂單」開始</div>';
      return;
    }

    list.innerHTML = filtered.map(o => {
      const s = STATUS[o.status] || STATUS.pending;
      const next = STATUS_NEXT[o.status];
      const nextLabel = STATUS_NEXT_LABEL[o.status];
      const time = o.createdAt?.toDate ? formatTime(o.createdAt.toDate()) : '—';

      const driverHtml = o.driver
        ? `<div class="driver-info"><div class="driver-avatar">${o.driver.slice(0,2)}</div><span class="driver-name">${o.driver}</span></div>`
        : `<div class="driver-info"><span class="driver-name no-driver">尚未有外送員接單</span></div>`;

      const actionHtml = next
        ? `<button class="action-btn primary" onclick="advanceStatus('${o.id}','${next}')">${nextLabel}</button>`
        : '';
      const cancelHtml = o.status === 'pending'
        ? `<button class="action-btn" onclick="cancelOrder('${o.id}')">取消</button>` : '';

      return `<div class="order-card">
        <div class="order-top">
          <div class="order-meta">
            <div class="order-id">#${o.id.slice(-6).toUpperCase()} &nbsp;·&nbsp; ${o.address}</div>
            <div class="order-shop">${o.shop}</div>
            <div class="order-items">${o.items}${o.note ? ' &nbsp;<span class="order-note">備註：' + o.note + '</span>' : ''}</div>
          </div>
          <span class="status-badge ${s.cls}">${s.label}</span>
        </div>
        <div class="order-bottom">
          ${driverHtml}
          <div class="order-actions">
            <span class="order-time">${time}</span>
            ${actionHtml}
            ${cancelHtml}
          </div>
        </div>
      </div>`;
    }).join('');
  }

  function formatTime(date) {
    return date.toLocaleTimeString('zh-TW', { hour: '2-digit', minute: '2-digit' });
  }

  window.openModal = () => {
    document.getElementById('modal-backdrop').classList.add('open');
    setTimeout(() => document.getElementById('f-shop').focus(), 50);
  };
  window.closeModal = () => {
    document.getElementById('modal-backdrop').classList.remove('open');
  };
  window.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });
</script>

<style>
  @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700&display=swap');
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #f5f4f0;
    --surface: #ffffff;
    --border: rgba(0,0,0,0.09);
    --border-hover: rgba(0,0,0,0.18);
    --text: #1a1a18;
    --text-2: #6b6b67;
    --text-3: #a0a09b;
    --green: #06C755;
    --green-light: #e4f7ec;
    --green-dark: #04a344;
    --amber: #f59e0b;
    --amber-light: #fef3c7;
    --blue: #3b82f6;
    --blue-light: #eff6ff;
    --red: #ef4444;
    --red-light: #fef2f2;
    --gray-light: #f1f0ec;
    --radius: 10px;
    --radius-sm: 6px;
  }

  body {
    font-family: 'Noto Sans TC', sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    font-size: 14px;
    line-height: 1.6;
  }

  .app { max-width: 820px; margin: 0 auto; padding: 28px 16px 60px; }

  .header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 24px; }
  .header h1 { font-size: 20px; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 12px; color: var(--text-3); margin-top: 2px; display: flex; align-items: center; gap: 5px; }
  .live-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--green); animation: pulse 2s infinite; }
  @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

  .btn-new {
    background: var(--green); color: #fff; border: none; border-radius: var(--radius-sm);
    padding: 9px 18px; font-size: 14px; font-weight: 500; cursor: pointer;
    font-family: inherit; transition: background 0.15s; white-space: nowrap;
  }
  .btn-new:hover { background: var(--green-dark); }

  .stats { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin-bottom: 20px; }
  .stat-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px 16px; }
  .stat-label { font-size: 12px; color: var(--text-3); margin-bottom: 4px; }
  .stat-num { font-size: 26px; font-weight: 700; }
  .s-pending { color: var(--amber); }
  .s-active  { color: var(--blue); }
  .s-done    { color: var(--green); }

  .filters { display: flex; gap: 6px; margin-bottom: 16px; flex-wrap: wrap; }
  .filter-btn {
    font-size: 13px; padding: 5px 14px; border-radius: 20px;
    border: 1px solid var(--border); background: var(--surface);
    color: var(--text-2); cursor: pointer; font-family: inherit; transition: all 0.12s;
  }
  .filter-btn:hover { border-color: var(--border-hover); }
  .filter-btn.active { background: var(--text); color: #fff; border-color: var(--text); }

  .order-list { display: flex; flex-direction: column; gap: 10px; }
  .order-card {
    background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 14px 16px; transition: border-color 0.12s, box-shadow 0.12s;
  }
  .order-card:hover { border-color: var(--border-hover); box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
  .order-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 12px; margin-bottom: 12px; }
  .order-id    { font-size: 12px; color: var(--text-3); font-family: monospace; }
  .order-shop  { font-size: 15px; font-weight: 700; margin-top: 2px; }
  .order-items { font-size: 13px; color: var(--text-2); margin-top: 2px; }
  .order-note  { color: var(--text-3); }

  .status-badge { font-size: 11px; font-weight: 500; padding: 3px 10px; border-radius: 20px; white-space: nowrap; flex-shrink: 0; }
  .badge-pending    { background: var(--amber-light); color: #92400e; }
  .badge-accepted   { background: var(--blue-light);  color: #1e40af; }
  .badge-delivering { background: var(--green-light);  color: #065f46; }
  .badge-done       { background: var(--gray-light);   color: var(--text-2); }
  .badge-cancelled  { background: var(--red-light);    color: #991b1b; }

  .order-bottom {
    display: flex; justify-content: space-between; align-items: center;
    padding-top: 10px; border-top: 1px solid var(--border);
  }
  .driver-info { display: flex; align-items: center; gap: 8px; }
  .driver-avatar {
    width: 26px; height: 26px; border-radius: 50%; background: var(--green-light);
    color: var(--green-dark); display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .driver-name { font-size: 13px; color: var(--text-2); }
  .no-driver   { color: var(--text-3); }
  .order-actions { display: flex; align-items: center; gap: 8px; }
  .order-time    { font-size: 12px; color: var(--text-3); }

  .action-btn {
    font-size: 12px; padding: 5px 12px; border-radius: var(--radius-sm);
    border: 1px solid var(--border); background: transparent; cursor: pointer;
    color: var(--text-2); font-family: inherit; transition: all 0.12s;
  }
  .action-btn:hover { border-color: var(--border-hover); background: var(--gray-light); }
  .action-btn.primary { border-color: var(--green); color: var(--green-dark); }
  .action-btn.primary:hover { background: var(--green-light); }

  .empty { text-align: center; padding: 48px 20px; color: var(--text-3); font-size: 14px; }

  .modal-backdrop {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.35); z-index: 100;
    align-items: center; justify-content: center; padding: 20px;
  }
  .modal-backdrop.open { display: flex; }
  .modal {
    background: var(--surface); border-radius: 14px;
    width: 100%; max-width: 460px; padding: 24px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.15);
    animation: pop 0.15s ease;
  }
  @keyframes pop { from{transform:scale(0.96);opacity:0} to{transform:scale(1);opacity:1} }
  .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
  .modal-header h2 { font-size: 16px; font-weight: 700; }
  .modal-close {
    width: 28px; height: 28px; border-radius: 50%; border: none;
    background: var(--gray-light); cursor: pointer; font-size: 16px; color: var(--text-2);
    display: flex; align-items: center; justify-content: center;
  }
  .modal-close:hover { background: var(--border-hover); }

  .form-group { margin-bottom: 14px; }
  .form-label { font-size: 12px; font-weight: 500; color: var(--text-2); margin-bottom: 5px; display: block; }
  .form-label .req { color: var(--red); }
  .form-input, .form-textarea {
    width: 100%; border: 1px solid var(--border); border-radius: var(--radius-sm);
    padding: 9px 12px; font-size: 14px; font-family: inherit; color: var(--text);
    background: var(--surface); outline: none; transition: border-color 0.12s;
  }
  .form-input:focus, .form-textarea:focus { border-color: var(--green); }
  .form-textarea { resize: vertical; min-height: 70px; }

  .form-actions { display: flex; gap: 8px; margin-top: 20px; }
  .btn-cancel {
    flex: 1; padding: 10px; border: 1px solid var(--border); border-radius: var(--radius-sm);
    background: transparent; cursor: pointer; font-family: inherit; font-size: 14px; color: var(--text-2);
  }
  .btn-submit {
    flex: 2; padding: 10px; border: none; border-radius: var(--radius-sm);
    background: var(--green); color: #fff; cursor: pointer; font-family: inherit;
    font-size: 14px; font-weight: 500; transition: background 0.12s;
  }
  .btn-submit:hover { background: var(--green-dark); }
  .btn-submit:disabled { opacity: 0.6; cursor: not-allowed; }

  @media (max-width: 500px) {
    .stats { grid-template-columns: repeat(2, 1fr); }
    .order-bottom { flex-direction: column; align-items: flex-start; gap: 10px; }
    .order-actions { width: 100%; justify-content: flex-end; }
  }
</style>
</head>
<body>
<div class="app">

  <div class="header">
    <div>
      <h1>美食街訂單管理</h1>
      <div class="header-sub">
        <div class="live-dot"></div>
        <span>即時同步中</span>
      </div>
    </div>
    <button class="btn-new" onclick="openModal()">＋ 新增訂單</button>
  </div>

  <div class="stats">
    <div class="stat-card">
      <div class="stat-label">今日訂單</div>
      <div class="stat-num" id="stat-total">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">待接單</div>
      <div class="stat-num s-pending" id="stat-pending">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">配送中</div>
      <div class="stat-num s-active" id="stat-active">—</div>
    </div>
    <div class="stat-card">
      <div class="stat-label">已完成</div>
      <div class="stat-num s-done" id="stat-done">—</div>
    </div>
  </div>

  <div class="filters">
    <button class="filter-btn active" data-filter="all"     onclick="setFilter('all')">全部</button>
    <button class="filter-btn"        data-filter="pending" onclick="setFilter('pending')">待接單</button>
    <button class="filter-btn"        data-filter="active"  onclick="setFilter('active')">配送中</button>
    <button class="filter-btn"        data-filter="done"    onclick="setFilter('done')">已完成</button>
  </div>

  <div class="order-list" id="order-list">
    <div class="empty">連接中...</div>
  </div>
</div>

<div class="modal-backdrop" id="modal-backdrop" onclick="if(event.target===this)closeModal()">
  <div class="modal">
    <div class="modal-header">
      <h2>新增訂單</h2>
      <button class="modal-close" onclick="closeModal()">✕</button>
    </div>
    <div class="form-group">
      <label class="form-label" for="f-shop">店家名稱 <span class="req">*</span></label>
      <input class="form-input" id="f-shop" type="text" placeholder="例：港式飲茶">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-items">品項 <span class="req">*</span></label>
      <input class="form-input" id="f-items" type="text" placeholder="例：蝦餃x2、燒賣x3">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-address">送達地址 <span class="req">*</span></label>
      <input class="form-input" id="f-address" type="text" placeholder="例：新生路 201 號 3F">
    </div>
    <div class="form-group">
      <label class="form-label" for="f-note">備註（選填）</label>
      <textarea class="form-textarea" id="f-note" placeholder="例：門口按對講機、不加辣"></textarea>
    </div>
    <div class="form-actions">
      <button class="btn-cancel" onclick="closeModal()">取消</button>
      <button class="btn-submit" id="submit-btn" onclick="submitOrder()">建立訂單</button>
    </div>
  </div>
</div>

</body>
</html>
